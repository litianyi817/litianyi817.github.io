<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="网站正式上线，聊聊搭建这个个人站点的初衷与计划。">
  <title>你好，世界！ - Litianyi</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>L</text></svg>">
</head>
<body>

  <div id="header"></div>

  <main>
    <article class="post">
      <a href="/blog/" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        返回博客
      </a>

      <header class="post-header">
        <time>2026-05-16</time>
        <h1>你好，世界！这是我的第一篇博客</h1>
        <div class="post-tags">
          <span class="post-tag">随笔</span>
          <span class="post-tag">网站</span>
        </div>
      </header>

      <div class="post-body" id="postBody"></div>
    </article>
  </main>

  <div id="footer"></div>

  <script src="/assets/marked.min.js"></script>
  <script src="/script.js"></script>
  <script>
    fetch("/blog/hello-world.md")
      .then(r => r.text())
      .then(md => { document.getElementById("postBody").innerHTML = marked.parse(md); });
  </script>
</body>
</html>
