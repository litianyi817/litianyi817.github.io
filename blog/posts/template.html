<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="文章摘要（用于 SEO 和社交分享）">
  <title>文章标题 - Litianyi</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>L</text></svg>">
</head>
<body>

  <div id="header"></div>

  <main>
    <article class="post">
      <a href="/blog/" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        返回博客
      </a>

      <header class="post-header">
        <time>YYYY-MM-DD</time>
        <h1>文章标题</h1>
        <div class="post-tags">
          <span class="post-tag">标签1</span>
          <span class="post-tag">标签2</span>
        </div>
      </header>

      <div class="post-body" id="postBody"></div>

      <div class="post-actions">
        <button class="post-action" data-action="like" data-slug="YOUR-SLUG">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span class="post-action-count">0</span>
        </button>
        <button class="post-action" data-action="fav" data-slug="YOUR-SLUG">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          收藏
        </button>
      </div>
    </article>
  </main>

  <div id="footer"></div>

  <script src="/assets/marked.min.js"></script>
  <script src="/script.js"></script>
  <script>
    // 修改这里的 slug 为 .md 文件名（不带扩展名）
    fetch("/blog/YOUR-SLUG.md")
      .then(r => r.text())
      .then(md => { document.getElementById("postBody").innerHTML = marked.parse(md); });
  </script>
</body>
</html>
